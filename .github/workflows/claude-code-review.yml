name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment'
          claude_args: '--model claude-opus-4-6 --effort high --allowedTools "Bash(gh api *),Bash(gh pr *),Bash(go *),Bash(cd scheduler && go *),Bash(gofmt *),Bash(cd scheduler && gofmt *),Bash(find *),Write"'
          allowed_bots: 'claude'
          show_full_output: true

      - name: Post review results to PR
        if: always() && steps.claude-review.outputs.result
        uses: actions/github-script@v7
        env:
          REVIEW_RESULT: ${{ steps.claude-review.outputs.result }}
        with:
          script: |
            const result = process.env.REVIEW_RESULT;
            if (!result || result.trim() === '') {
              console.log('No review output to post.');
              return;
            }
            const body = `## Claude Code Review Results\n\n${result}`;
            const maxLen = 65000;
            const truncated = body.length > maxLen
              ? body.substring(0, maxLen) + '\n\n...(truncated)'
              : body;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: truncated
            });
