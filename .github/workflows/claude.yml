name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Verify @claude is an actual invocation (not in a code block or example)
        id: verify_invocation
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Select body based on event type
          case "$EVENT_NAME" in
            issue_comment|pull_request_review_comment)
              BODY="$COMMENT_BODY"
              ;;
            pull_request_review)
              BODY="$REVIEW_BODY"
              ;;
            issues)
              BODY="$ISSUE_BODY"
              ;;
          esac

          # Strip fenced code blocks (``` ... ```) and inline code spans (` ... `)
          # shellcheck disable=SC2016  # single quotes are intentional — Perl regex has no shell vars
          STRIPPED=$(printf '%s' "$BODY" | perl -0777 -pe 's/```.*?```//gs' | sed 's/`[^`]*`//g')

          # @claude is a real invocation only when it appears at the start of a line
          if printf '%s' "$STRIPPED" | grep -qE '(^|(\r?\n))[[:space:]]*@claude([[:space:]]|$)'; then
            echo "invoked=true" >> "$GITHUB_OUTPUT"
          else
            echo "invoked=false" >> "$GITHUB_OUTPUT"
            echo "::notice::@claude found but only inside code blocks or examples — skipping."
          fi

      - name: Resolve model from @claude invocation
        if: steps.verify_invocation.outputs.invoked == 'true'
        id: resolve_model
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Select body based on event type
          case "$EVENT_NAME" in
            issue_comment|pull_request_review_comment)
              BODY="$COMMENT_BODY"
              ;;
            pull_request_review)
              BODY="$REVIEW_BODY"
              ;;
            issues)
              BODY="$ISSUE_BODY"
              ;;
          esac

          # Strip fenced code blocks (``` ... ```) and inline code spans (` ... `)
          # shellcheck disable=SC2016  # single quotes are intentional — Perl regex has no shell vars
          STRIPPED=$(printf '%s' "$BODY" | perl -0777 -pe 's/```.*?```//gs' | sed 's/`[^`]*`//g')

          # Extract optional model shorthand after @claude on a line boundary
          # e.g. "@claude sonnet fix this" → "sonnet"
          MODEL_SHORT=$(printf '%s' "$STRIPPED" | grep -oE '(^|(\r?\n))[[:space:]]*@claude[[:space:]]+[a-z]+' | head -1 | awk '{print $NF}' || true)

          case "$MODEL_SHORT" in
            opus)    MODEL_ID="claude-opus-4-7[1m]" ;;
            sonnet)  MODEL_ID="claude-sonnet-4-6[1m]" ;;
            haiku)   MODEL_ID="claude-haiku-4-5" ;;
            *)       MODEL_ID="claude-opus-4-7[1m]" ;;  # default (no model specified)
          esac

          echo "model_id=$MODEL_ID" >> "$GITHUB_OUTPUT"
          echo "::notice::Using model: $MODEL_ID"

          # Extract optional effort level from comment: "effort:low", "effort:medium", "effort:high"
          EFFORT_RAW=$(printf '%s' "$STRIPPED" | grep -oiE 'effort:(low|medium|high)' | head -1 | tr '[:upper:]' '[:lower:]' | cut -d: -f2 || true)
          EFFORT="${EFFORT_RAW:-high}"
          echo "effort=$EFFORT" >> "$GITHUB_OUTPUT"
          echo "::notice::Using effort: $EFFORT"

      - name: Checkout repository
        if: steps.verify_invocation.outputs.invoked == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Go
        if: steps.verify_invocation.outputs.invoked == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Python (uv)
        if: steps.verify_invocation.outputs.invoked == 'true'
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        if: steps.verify_invocation.outputs.invoked == 'true'
        run: uv sync --frozen --extra test

      - name: Clean up lockfile changes before Claude checkout
        if: steps.verify_invocation.outputs.invoked == 'true'
        run: git checkout -- uv.lock

      - name: Record HEAD sha before Claude runs
        if: steps.verify_invocation.outputs.invoked == 'true'
        id: pre_claude
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        if: steps.verify_invocation.outputs.invoked == 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Allow Claude's own bot user to trigger reviews on its own PRs
          allowed_bots: 'claude'

          # Show full output in the job summary (important for code review results)
          show_full_output: true

          # Load the code-review plugin so @claude review uses structured review skill
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: --model ${{ steps.resolve_model.outputs.model_id }} --effort ${{ steps.resolve_model.outputs.effort }} --allowedTools "Bash(go *),Bash(cd scheduler && go *),Bash(uv run *),Bash(python3 *),Bash(.venv/bin/python3 *),Bash(gofmt *),Bash(cd scheduler && gofmt *),Bash(git *)"

      - name: Detect if Claude made commits
        if: steps.verify_invocation.outputs.invoked == 'true' && steps.claude.outcome == 'success'
        id: claude_changes
        env:
          PRE_SHA: ${{ steps.pre_claude.outputs.sha }}
        run: |
          git fetch --quiet origin "$GITHUB_REF_NAME" 2>/dev/null || true
          CURRENT_SHA=$(git rev-parse HEAD)
          if [ "$PRE_SHA" != "$CURRENT_SHA" ] || ! git diff --quiet || [ -n "$(git status --porcelain)" ]; then
            echo "made_commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "made_commits=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Claude made no code changes — skipping CLAUDE.md revision."
          fi

      - name: Revise CLAUDE.md with session learnings
        if: steps.verify_invocation.outputs.invoked == 'true' && steps.claude.outcome == 'success' && steps.claude_changes.outputs.made_commits == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Use the Skill tool to invoke the 'claude-md-management:revise-claude-md' skill. Review the changes made in this session (use git log and git diff to inspect them) and update CLAUDE.md with any new patterns, conventions, or important context learned."
          plugin_marketplaces: |
            https://github.com/anthropics/claude-code.git
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            code-review@claude-code-plugins
            claude-md-management@claude-plugins-official
          claude_args: --model ${{ steps.resolve_model.outputs.model_id }} --allowedTools "Bash(git *),Edit,Read,Grep,Glob,Write"

      - name: Append LLM footer to Claude comment
        if: steps.verify_invocation.outputs.invoked == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          MODEL_ID: ${{ steps.resolve_model.outputs.model_id }}
          EFFORT: ${{ steps.resolve_model.outputs.effort }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          case "$MODEL_ID" in
            "claude-opus-4-7[1m]")   MODEL_NAME="Claude Opus 4.7 (1M)" ;;
            "claude-sonnet-4-6[1m]") MODEL_NAME="Claude Sonnet 4.6 (1M)" ;;
            claude-haiku-4-5)        MODEL_NAME="Claude Haiku 4.5" ;;
            *)                       MODEL_NAME="$MODEL_ID" ;;
          esac

          COMMENT=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER/comments" \
            --jq '[.[] | select(.user.login == "claude[bot]")] | sort_by(.updated_at) | last')

          COMMENT_ID=$(echo "$COMMENT" | jq -r '.id')
          BODY=$(echo "$COMMENT" | jq -r '.body')

          if [ -z "$COMMENT_ID" ] || [ "$COMMENT_ID" = "null" ]; then
            echo "No claude[bot] comment found"
            exit 0
          fi

          # Strip any stale LLM footer Claude may have written (it doesn't know
          # the real --effort value, so it guesses). The workflow is authoritative.
          BODY=$(printf '%s' "$BODY" | python3 .github/scripts/strip_llm_footer.py)

          TODAY=$(date -u +%Y%m%d)

          USAGE=$(npx --yes ccusage@latest session --json --since "$TODAY" --order desc 2>/tmp/ccusage-err || echo "[]")
          [ -s /tmp/ccusage-err ] && echo "ccusage stderr: $(cat /tmp/ccusage-err)"
          COST=$(printf '%s' "$USAGE" | jq -r 'if .sessions and (.sessions | length) > 0 then .sessions[0] | "Tokens: \(.inputTokens // 0) in / \(.outputTokens // 0) out | Cache: \(.cacheReadTokens // 0) read / \(.cacheCreationTokens // 0) written | Cost: $\(.totalCost // 0 | . * 100 | round / 100)" else "" end' 2>/dev/null || true)

          FOOTER="---"$'\n'"LLM: ${MODEL_NAME} | ${EFFORT}"
          if [ -n "$COST" ]; then
            FOOTER="${FOOTER} | ${COST}"
          fi

          NEW_BODY="${BODY}"$'\n\n'"${FOOTER}"

          # Rewrite the "Create PR" link's prefilled `body=` query param so the PR
          # description ends with our model/effort footer instead of the default
          # "Generated with [Claude Code](https://claude.com/claude-code)" line.
          NEW_BODY=$(BODY_IN="$NEW_BODY" FOOTER_TEXT="$FOOTER" python3 .github/scripts/rewrite_create_pr_link.py)

          gh api "repos/$REPO/issues/comments/$COMMENT_ID" \
            --method PATCH \
            --field body="$NEW_BODY"
