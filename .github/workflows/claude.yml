name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

# Serialize runs per issue/PR: both comment-patch steps rewrite "the latest
# claude[bot] comment", so overlapping runs would stamp each other's comments.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    # Bound hung runs (GitHub default is 360 minutes); recorded runs peak at 15.
    timeout-minutes: 45
    env:
      CLAUDE_HARNESS: anthropics/claude-code-action@v1
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Verify @claude is an actual invocation (not in a code block or example)
        id: verify_invocation
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Select body based on event type
          case "$EVENT_NAME" in
            issue_comment|pull_request_review_comment)
              BODY="$COMMENT_BODY"
              ;;
            pull_request_review)
              BODY="$REVIEW_BODY"
              ;;
            issues)
              BODY="$ISSUE_BODY"
              ;;
          esac

          # Strip fenced code blocks (``` ... ```) and inline code spans (` ... `)
          # shellcheck disable=SC2016  # single quotes are intentional — Perl regex has no shell vars
          STRIPPED=$(printf '%s' "$BODY" | perl -0777 -pe 's/```.*?```//gs' | sed 's/`[^`]*`//g')

          # @claude is a real invocation only when it appears at the start of a line
          if printf '%s' "$STRIPPED" | grep -qE '(^|(\r?\n))[[:space:]]*@claude([[:space:]]|$)'; then
            echo "invoked=true" >> "$GITHUB_OUTPUT"
          else
            echo "invoked=false" >> "$GITHUB_OUTPUT"
            echo "::notice::@claude found but only inside code blocks or examples — skipping."
          fi

      - name: Resolve model from @claude invocation
        if: steps.verify_invocation.outputs.invoked == 'true'
        id: resolve_model
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Select body based on event type
          case "$EVENT_NAME" in
            issue_comment|pull_request_review_comment)
              BODY="$COMMENT_BODY"
              ;;
            pull_request_review)
              BODY="$REVIEW_BODY"
              ;;
            issues)
              BODY="$ISSUE_BODY"
              ;;
          esac

          # Strip fenced code blocks (``` ... ```) and inline code spans (` ... `)
          # shellcheck disable=SC2016  # single quotes are intentional — Perl regex has no shell vars
          STRIPPED=$(printf '%s' "$BODY" | perl -0777 -pe 's/```.*?```//gs' | sed 's/`[^`]*`//g')

          # Extract optional model shorthand after @claude on a line boundary
          # e.g. "@claude sonnet fix this" → "sonnet"
          MODEL_SHORT=$(printf '%s' "$STRIPPED" | grep -oE '(^|(\r?\n))[[:space:]]*@claude[[:space:]]+[a-z]+' | head -1 | awk '{print $NF}' || true)

          case "$MODEL_SHORT" in
            opus)    MODEL_ID="claude-opus-4-8[1m]" ;;
            sonnet)  MODEL_ID="claude-sonnet-5" ;;
            fable)   MODEL_ID="claude-fable-5" ;;
            *)       MODEL_ID="claude-opus-4-8[1m]" ;;  # default (no model specified)
          esac

          echo "model_id=$MODEL_ID" >> "$GITHUB_OUTPUT"
          echo "::notice::Using model: $MODEL_ID"

          # Extract optional effort level from comment: "effort:low", "effort:medium", "effort:high", "effort:xhigh"
          EFFORT_RAW=$(printf '%s' "$STRIPPED" | grep -oiE 'effort:(low|medium|xhigh|high)' | head -1 | tr '[:upper:]' '[:lower:]' | cut -d: -f2 || true)
          EFFORT="${EFFORT_RAW:-xhigh}"
          echo "effort=$EFFORT" >> "$GITHUB_OUTPUT"
          echo "::notice::Using effort: $EFFORT"

      - name: Checkout repository
        if: steps.verify_invocation.outputs.invoked == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Go
        if: steps.verify_invocation.outputs.invoked == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Python (uv)
        if: steps.verify_invocation.outputs.invoked == 'true'
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        if: steps.verify_invocation.outputs.invoked == 'true'
        run: uv sync --frozen --extra test

      - name: Clean up lockfile changes before Claude checkout
        if: steps.verify_invocation.outputs.invoked == 'true'
        run: git checkout -- uv.lock

      - name: Record HEAD sha before Claude runs
        if: steps.verify_invocation.outputs.invoked == 'true'
        id: pre_claude
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          BASELINE_SHA="$PR_HEAD_SHA"
          if [ -z "$BASELINE_SHA" ] && [ -n "$ISSUE_NUMBER" ]; then
            BASELINE_SHA=$(gh pr view "$ISSUE_NUMBER" --repo "$REPO" --json headRefOid --jq .headRefOid 2>/dev/null || true)
          fi
          if [ -z "$BASELINE_SHA" ]; then
            BASELINE_SHA=$(git rev-parse HEAD)
          fi
          echo "sha=$BASELINE_SHA" >> "$GITHUB_OUTPUT"

      - name: Compose review prompt
        if: steps.verify_invocation.outputs.invoked == 'true'
        id: compose_prompt
        env:
          MODEL_ID: ${{ steps.resolve_model.outputs.model_id }}
          EFFORT: ${{ steps.resolve_model.outputs.effort }}
        run: |
          # Single source of truth for the PR-review output contract lives in
          # .github/prompts/pr-review-format.md (pure prompt text). Flatten it to
          # one line and inject as --append-system-prompt. The allowedTools list
          # is workflow capability (not review format), so it stays here.
          PROMPT=$(tr '\n' ' ' < .github/prompts/pr-review-format.md | sed -e 's/[[:space:]]\{2,\}/ /g' -e 's/^ *//' -e 's/ *$//')
          # claude_args is shell-evaluated downstream: a double quote breaks the
          # quoting, and a backtick or dollar sign would expand or execute.
          if printf '%s' "$PROMPT" | grep -q '["`$]'; then
            echo "::error::pr-review-format.md must not contain double quotes, backticks, or dollar signs (claude_args is shell-evaluated)."
            exit 1
          fi
          # git/gh are narrowed instead of wildcarded: Claude reads untrusted PR
          # content while the job token can write contents and merge PRs, so a
          # prompt-injected diff must not reach gh pr merge or push outside the
          # current branch. The push rules are exact-match (no trailing
          # wildcard): a refspec (HEAD:main) or --force does not match. No
          # gh api — its --method flag reaches every mutating endpoint. No CI
          # readers (gh pr checks / gh run *): reviews intentionally do not
          # gate on CI, which outlasts the review.
          ALLOWED='Bash(go *),Bash(cd scheduler && go *),Bash(uv run *),Bash(python3 *),Bash(.venv/bin/python3 *),Bash(gofmt *),Bash(cd scheduler && gofmt *),Bash(git status*),Bash(git log*),Bash(git diff*),Bash(git show*),Bash(git fetch*),Bash(git branch*),Bash(git rev-parse*),Bash(git checkout*),Bash(git switch*),Bash(git add*),Bash(git commit*),Bash(git push origin HEAD),Bash(git push -u origin HEAD),Bash(git push --set-upstream origin HEAD),Bash(gh pr view*),Bash(gh pr diff*),Bash(gh pr comment*),Bash(gh issue view*)'
          ARGS="--model ${MODEL_ID} --effort ${EFFORT} --append-system-prompt \"${PROMPT}\" --allowedTools \"${ALLOWED}\""
          {
            printf 'claude_args<<CLAUDE_ARGS_EOF\n'
            printf '%s\n' "$ARGS"
            printf 'CLAUDE_ARGS_EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        if: steps.verify_invocation.outputs.invoked == 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Allow Claude's own bot user to trigger reviews on its own PRs
          allowed_bots: 'claude'

          # Show full output in the job summary (important for code review results)
          show_full_output: true

          # Load the code-review plugin so @claude review uses structured review skill
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: ${{ steps.compose_prompt.outputs.claude_args }}

      - name: Fail if Claude Code returned an error
        if: steps.verify_invocation.outputs.invoked == 'true' && steps.claude.outcome == 'success'
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          if [ -z "$EXECUTION_FILE" ] || [ ! -f "$EXECUTION_FILE" ]; then
            echo "::error::Claude Code execution output file is missing."
            exit 1
          fi

          RESULT=$(jq -s '
            def records:
              .[] | if type == "array" then .[] else . end;
            [records | select(type == "object" and .type == "result")] | last // {}
          ' "$EXECUTION_FILE")
          IS_ERROR=$(printf '%s' "$RESULT" | jq -r '.is_error // false')
          if [ "$IS_ERROR" = "true" ]; then
            API_STATUS=$(printf '%s' "$RESULT" | jq -r '.api_error_status // empty')
            MESSAGE=$(printf '%s' "$RESULT" | jq -r '.result // "Claude Code reported an error."')
            if [ -n "$API_STATUS" ]; then
              echo "::error::Claude Code failed with API status ${API_STATUS}: ${MESSAGE}"
            else
              echo "::error::Claude Code failed: ${MESSAGE}"
            fi
            exit 1
          fi

      - name: Detect if Claude made commits
        if: steps.verify_invocation.outputs.invoked == 'true' && steps.claude.outcome == 'success'
        id: claude_changes
        env:
          PRE_SHA: ${{ steps.pre_claude.outputs.sha }}
        run: |
          git fetch --quiet origin "$GITHUB_REF_NAME" 2>/dev/null || true
          CURRENT_SHA=$(git rev-parse HEAD)
          if [ "$PRE_SHA" != "$CURRENT_SHA" ] || ! git diff --quiet || [ -n "$(git status --porcelain)" ]; then
            echo "made_commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "made_commits=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Claude made no code changes — skipping CLAUDE.md revision."
          fi

      - name: Revise CLAUDE.md with session learnings
        if: steps.verify_invocation.outputs.invoked == 'true' && steps.claude.outcome == 'success' && steps.claude_changes.outputs.made_commits == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Use the Skill tool to invoke the 'claude-md-management:revise-claude-md' skill. Review the changes made in this session (use git log and git diff to inspect them) and update CLAUDE.md with any new patterns, conventions, or important context learned. If you modified CLAUDE.md, you MUST persist it: commit it on the current branch following the repository commit conventions and push with git push origin HEAD — an uncommitted edit is discarded when this job ends."
          plugin_marketplaces: |
            https://github.com/anthropics/claude-code.git
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            code-review@claude-code-plugins
            claude-md-management@claude-plugins-official
          claude_args: --model ${{ steps.resolve_model.outputs.model_id }} --effort ${{ steps.resolve_model.outputs.effort }} --allowedTools "Bash(git status*),Bash(git log*),Bash(git diff*),Bash(git show*),Bash(git add*),Bash(git commit*),Bash(git push origin HEAD),Edit,Read,Grep,Glob,Write"

      # Footer composition and comment patching live in .github/scripts
      # (patch_claude_comment.sh + compose_claude_comment.py) — shared with the
      # cancellation/failure step below and unit-tested.
      - name: Append LLM footer to Claude comment
        if: steps.verify_invocation.outputs.invoked == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          MODEL_ID: ${{ steps.resolve_model.outputs.model_id }}
          EFFORT: ${{ steps.resolve_model.outputs.effort }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: bash .github/scripts/patch_claude_comment.sh

      - name: Mark cancellation for downstream status note
        if: always() && cancelled()
        run: echo "IS_CANCELLED=true" >> "$GITHUB_ENV"

      - name: Note workflow cancellation/failure on Claude comment
        if: always() && steps.verify_invocation.outputs.invoked == 'true' && (cancelled() || failure())
        env:
          GH_TOKEN: ${{ github.token }}
          MODEL_ID: ${{ steps.resolve_model.outputs.model_id }}
          EFFORT: ${{ steps.resolve_model.outputs.effort }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # A failure before (or during) checkout leaves no scripts to run with.
          if [ ! -f .github/scripts/patch_claude_comment.sh ]; then
            echo "::notice::Checkout unavailable — cannot patch the Claude comment."
            exit 0
          fi

          if [ "${IS_CANCELLED:-}" = "true" ]; then
            STATUS_NOTE="**Workflow cancelled before completion.** See [run log]($RUN_URL)."
          else
            STATUS_NOTE="**Workflow failed before completion.** See [run log]($RUN_URL)."
          fi
          export STATUS_NOTE

          bash .github/scripts/patch_claude_comment.sh
