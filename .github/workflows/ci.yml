name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: cd scheduler && go build -ldflags "-X main.Version=$(git describe --tags --always --dirty=-mod)" .

      - name: Test
        run: cd scheduler && go test ./...

      - name: Format check
        run: |
          cd scheduler
          unformatted=$(gofmt -l *.go)
          if [ -n "$unformatted" ]; then
            echo "Files need formatting:"
            echo "$unformatted"
            exit 1
          fi

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra test

      - name: Syntax check
        run: |
          find shared_scripts/ platforms/ shared_strategies/ shared_tools/ \
            -name '*.py' -print0 \
            | xargs -0 uv run python3 -m py_compile

      # -n auto distributes tests across all runner cores (pytest-xdist);
      # the sequential run took ~12 min dominated by 5 regime test files (#1304).
      - name: Run tests
        run: uv run pytest -n auto

      # shared_scripts/test_*.py sit outside pytest testpaths (pyproject.toml)
      # so `uv run pytest` never collects them — invoke explicitly (#1237).
      - name: Run shared_scripts tests (outside testpaths)
        run: uv run pytest shared_scripts/
